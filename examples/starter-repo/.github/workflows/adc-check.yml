# ADC設計リポジトリ用CI(スターター版)。
# ADC本体とは別リポジトリで design.ron を検証する構成:
# ADC本体をチェックアウトし、そのdevcontainerイメージ(OCCTプリビルド)内で
# adcをビルドして本リポジトリの design.ron を検証、margin表をStep Summaryへ。
#
# TODO(導入時): ADC_REF を利用するADCのリリースrev/tagに固定すること
name: adc-check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ADC_REPO: NakaGater/adc
  ADC_REF: main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ADC本体をチェックアウト
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ADC_REPO }}
          ref: ${{ env.ADC_REF }}
          path: .adc-src

      - name: GHCRログイン(devcontainerイメージのキャッシュ用)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: イメージ名を小文字化(GHCR要件)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ env.ADC_REPO }}' | tr '[:upper:]' '[:lower:]')-devcontainer" >> "$GITHUB_OUTPUT"

      - name: devcontainer内で build + check + report
        uses: devcontainers/ci@v0.3
        with:
          configFile: .adc-src/.devcontainer/devcontainer.json
          imageName: ${{ steps.img.outputs.name }}
          cacheFrom: ${{ steps.img.outputs.name }}
          push: never
          runCmd: bash .github/workflows/adc-check.sh

      - name: レポートをStep Summaryへ
        if: always()
        run: |
          if [ -f report.md ]; then
            cat report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "report.md が生成されていません(ビルド失敗)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: results.jsonl / report.md をアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adc-results
          path: |
            results.jsonl
            report.md
          if-no-files-found: ignore
